<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(title='Pricing Agreements', content=~{::main})}">
<main>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Pricing Agreements – <span th:text="${distributor.name}">Distributor Name</span></h1>
        <a th:href="@{/labels/{labelId}/distributors/{distributorId}(labelId=${label.id},distributorId=${distributor.id})}"
           class="btn btn-outline-secondary">Back to Distributor</a>
    </div>

    <div class="mb-3">
        <a th:href="@{/labels/{labelId}/distributors/{distributorId}/agreements/new(labelId=${label.id},distributorId=${distributor.id})}"
           class="btn btn-primary">New Agreement</a>
    </div>

    <div class="card">
        <div class="card-body">
            <p th:if="${agreements.empty}" class="text-muted mb-0">No pricing agreements yet.</p>
            <table th:unless="${agreements.empty}" class="table mb-0">
                <thead>
                <tr>
                    <th>Production Run</th>
                    <th>Unit Price</th>
                    <th>Commission %</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${agreements}">
                    <td th:text="${item.productionRunDisplayName}">Release – FORMAT</td>
                    <td th:text="${item.agreement.unitPrice}">0.00</td>
                    <td th:text="${item.agreement.commissionPercentage}">0.00</td>
                    <td class="text-end">
                        <a th:href="@{/labels/{labelId}/distributors/{distributorId}/agreements/{id}/edit(
                                labelId=${label.id},distributorId=${distributor.id},id=${item.agreement.id})}"
                           class="btn btn-sm btn-outline-primary me-1">Edit</a>
                        <form th:id="'delete-form-' + ${item.agreement.id}"
                              th:action="@{/labels/{labelId}/distributors/{distributorId}/agreements/{id}/delete(
                                      labelId=${label.id},distributorId=${distributor.id},id=${item.agreement.id})}"
                              method="post" class="d-inline">
                            <input type="hidden" th:if="${_csrf}"
                                   th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="button" class="btn btn-sm btn-outline-danger"
                                    th:onclick="'AgreementDelete.confirmDelete(\'delete-form-' + ${item.agreement.id} + '\')'">
                                Delete
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module" src="/js/agreement-delete.js"></script>
</main>
</html>
