<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(title='Pricing Agreement', content=~{::main})}">
<main>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 th:text="${agreement != null} ? 'Edit Pricing Agreement' : 'New Pricing Agreement'">
            Pricing Agreement
        </h1>
        <a th:href="@{/labels/{labelId}/distributors/{distributorId}(labelId=${label.id},distributorId=${distributor.id})}"
           class="btn btn-outline-secondary">Cancel</a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
        <strong>Error:</strong> <span th:text="${errorMessage}">Error message</span>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="${agreement != null}
                    ? @{/labels/{labelId}/distributors/{distributorId}/agreements/{id}(labelId=${label.id},distributorId=${distributor.id},id=${agreement.id})}
                    : @{/labels/{labelId}/distributors/{distributorId}/agreements(labelId=${label.id},distributorId=${distributor.id})}"
                  method="post" th:object="${form}">

                <div class="mb-3">
                    <label class="form-label">Production Run</label>
                    <div th:if="${agreement != null}">
                        <p class="form-control-plaintext" th:text="${productionRunDisplayName}">Release – FORMAT</p>
                        <input type="hidden" th:field="*{productionRunId}">
                    </div>
                    <div th:unless="${agreement != null}">
                        <p th:if="${availableRuns.empty}" class="text-muted">
                            No production runs available. Allocate a production run to this distributor first.
                        </p>
                        <select th:unless="${availableRuns.empty}" class="form-select"
                                id="productionRunId" th:field="*{productionRunId}" required>
                            <option value="">Select production run...</option>
                            <option th:each="run : ${availableRuns}"
                                    th:value="${run.productionRunId}"
                                    th:text="${run.displayName}">Release – FORMAT</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="unitPrice" class="form-label">Unit Price*</label>
                    <input type="number" class="form-control" id="unitPrice"
                           th:field="*{unitPrice}" step="0.01" min="0.01" required>
                </div>

                <div class="mb-3">
                    <label for="commissionPercentage" class="form-label">Commission %*</label>
                    <input type="number" class="form-control" id="commissionPercentage"
                           th:field="*{commissionPercentage}" step="0.01" min="0" max="100" required>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary"
                            th:text="${agreement != null} ? 'Save Changes' : 'Create Agreement'">
                        Submit
                    </button>
                    <a th:href="@{/labels/{labelId}/distributors/{distributorId}(labelId=${label.id},distributorId=${distributor.id})}"
                       class="btn btn-outline-secondary">Cancel</a>
                </div>

                <input type="hidden" th:if="${_csrf}"
                       th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            </form>
        </div>
    </div>
</main>
</html>
